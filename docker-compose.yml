services:

  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: rag_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_storage:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    image: ashrithr07/agentic-rag-engine:latest
    container_name: rag_app
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    image: ashrithr07/agentic-rag-engine:latest
    container_name: rag_dashboard
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./dashboard:/app/dashboard
      - ./configs:/app/configs
    environment:
      - API_URL=http://app:8000
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      - app
    restart: unless-stopped

volumes:
  qdrant_storage:
  redis_storage:
